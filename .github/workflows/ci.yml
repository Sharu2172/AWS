name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.*"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e .[dev]

      - name: Run tests
        run: uv run pytest
